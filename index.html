<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolt Dashboard - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0b0e14; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass-panel { background: rgba(17, 25, 40, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 p-4">

    <div id="login-container" class="glass-panel p-10 rounded-3xl w-full max-w-md shadow-2xl transition-all duration-500">
        <h1 class="text-white text-3xl font-bold mb-10 text-center tracking-tight">Revolt Dashboard</h1>
        <div class="space-y-6">
            <div>
                <label class="text-gray-400 text-xs uppercase tracking-widest font-semibold mb-2 block text-left">License Key</label>
                <input id="key-input" type="password" placeholder="Enter your license key" 
                       class="w-full bg-[#161b22] border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
            </div>
            <button onclick="requestAccess()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all">
                Sign In
            </button>
        </div>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 glass-panel flex flex-col items-center justify-center z-50">
        <div class="spinner mb-6"></div>
        <h2 class="text-white text-2xl font-semibold animate-pulse">Authenticating...</h2>
        <p class="text-gray-400 mt-3 text-sm text-center">Please wait while the administrator verifies your key.</p>
    </div>

    <div id="success-overlay" class="hidden fixed inset-0 glass-panel flex flex-col items-center justify-center z-50">
        <div class="bg-green-500/20 p-6 rounded-full mb-6">
            <svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-white text-3xl font-bold">Access Granted</h2>
        <p class="text-gray-300 mt-3 text-lg">Login successful, redirecting you now...</p>
    </div>

    <div id="reject-overlay" class="hidden fixed inset-0 glass-panel flex flex-col items-center justify-center z-50">
        <div class="bg-red-500/20 p-6 rounded-full mb-6">
            <svg class="w-16 h-16 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </div>
        <h2 class="text-white text-3xl font-bold">Access Denied</h2>
        <p class="text-red-400 mt-3 text-lg">Invalid or Expired License Key.</p>
        <button onclick="location.reload()" class="mt-8 text-gray-400 underline hover:text-white">Try Again</button>
    </div>

    <script>
        const socket = io();

        function requestAccess() {
            const key = document.getElementById('key-input').value;
            if(!key) return alert("Please enter a valid key.");

            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            socket.emit('check-key', key);
        }

        socket.on('admin-response', (status) => {
            // Hide loading first
            document.getElementById('loading-overlay').classList.add('hidden');

            if(status === 'approved') {
                document.getElementById('success-overlay').classList.remove('hidden');
                // هنا يمكنك وضع رابط حقيقي بعد 3 ثواني مثلاً
                // setTimeout(() => { window.location.href = "رابط_لوحة_التحكم"; }, 3000);
            } else {
                document.getElementById('reject-overlay').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
