<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revera Dashboard - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0b0e14; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass-panel { background: rgba(17, 25, 40, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200">

    <div id="login-container" class="glass-panel p-10 rounded-3xl w-full max-w-md shadow-2xl transition-all duration-500">
        <h1 class="text-white text-3xl font-bold mb-10 text-center tracking-tight">Revera Dashboard</h1>
        
        <div class="space-y-6">
            <div>
                <label class="text-gray-400 text-xs uppercase tracking-widest font-semibold mb-2 block">License Key</label>
                <input id="key-input" type="password" placeholder="Enter your license key" 
                       class="w-full bg-[#161b22] border border-gray-800 rounded-xl p-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
            </div>
            <button onclick="requestAccess()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 active:scale-[0.98] transition-all">
                Sign In
            </button>
        </div>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 glass-panel flex flex-col items-center justify-center z-50">
        <div class="spinner mb-6"></div>
        <h2 class="text-white text-2xl font-semibold animate-pulse">Authenticating...</h2>
        <p class="text-gray-400 mt-3 text-sm">Please wait while the administrator verifies your key.</p>
    </div>

    <script>
        const socket = io();

        function requestAccess() {
            const key = document.getElementById('key-input').value;
            if(!key) return alert("Please enter a valid key.");

            // Switch to loading state
            document.getElementById('login-container').classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('loading-overlay').classList.remove('hidden');
            }, 300);
            
            socket.emit('check-key', key);
        }

        socket.on('admin-response', (status) => {
            if(status === 'approved') {
                window.location.href = "https://your-success-page.com";
            } else {
                alert("Access Denied: Your license key was rejected.");
                location.reload();
            }
        });
    </script>
</body>
</html>
